<div class="col-md-5 col-md-offset-1 copyright">
  &copy; {{ site.title }} {{ site.time | date: '%Y' }}
  <span class="hidden-xs">&dash; {{ site.t.copyright[page.lang.code] }}</span>
</div>

<div class="col-md-5">
  {% assign pages = site.pages | where: "lang", page.lang | sort: 'weight' %}
  <ul class="nav nav-pills pull-right hidden-sm hidden-xs menu menu-small">
  {% for current_page in pages %}
    <li{% if current_page.id == page.id %} class="active"{% endif %}>
      <a href="{{ current_page.url }}">{{ current_page.title }}</a>
    </li>
  {% endfor %}
  </ul>
</div>
