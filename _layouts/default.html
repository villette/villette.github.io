<!DOCTYPE html>
<html>

  <head>
    {% seo %}

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width initial-scale=1, maximum-scale=1, user-scalable=no">

    <link rel="icon" type="image/png" href="/img/favicon.png">
    <link rel="stylesheet" type="text/css" href="//maxcdn.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="/fonts/Aller/stylesheet.css">
    <link rel="stylesheet" type="text/css" href="//usrz.github.io/bootstrap-languages/languages.min.css">
    <link rel="stylesheet" type="text/css" href="/css/style.css">
  </head>

  <body>
    <div class="container">
      <div class="row">
        <div class="col-md-10 col-md-offset-1 header">
          <img class="img-responsive banner" alt="Banner" src="/img/header.{{ page.lang }}.jpg">
        </div>
      </div>

      <div class="row">
        <div class="col-md-3 col-md-offset-1">
          {% include nav.html %}
        </div>

        <div class="col-md-7">
          {{ content }}
        </div>
      </div>

      <div class="row">
        <div class="clearfix footer">
          {% include footer.html %}
        </div>
      </div>
    </div>

    <script type="text/javascript" src="//code.jquery.com/jquery.js"></script>
    <script type="text/javascript" src="//maxcdn.bootstrapcdn.com/bootstrap/3.3.5/js/bootstrap.min.js"></script>
    {% if page.js %}<script type="text/javascript" src="/js/{{ page.js }}"></script>{% endif %}
  </body>

</html>
