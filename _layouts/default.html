<!DOCTYPE html>
<html lang="{{ page.lang }}">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Pierre Villette - {{ site.data.translations[page.lang].layout.title }}</title>

    <meta name="description" content="{{ site.data.translations[page.lang].layout.description }}" />
    <meta name="author" content="Pierre Villette" />

    <!-- OpenGraph -->
    <meta property="og:title" content="Pierre Villette - {{ site.data.translations[page.lang].layout.title }}" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="{{ page.lang }}" />
    <meta property="og:description" content="{{ site.data.translations[page.lang].layout.description }}" />
    <meta property="og:url" content="http://villette.github.io/{{ page.lang }}/" />
    <meta property="og:image" content="http://villette.github.io/img/profile.jpg" />

    <!-- Bootstrap core CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css">

    <!-- Custom fonts for this template -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Saira+Extra+Condensed:500,700">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Muli:400,400i,800,800i">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css">

    <!-- Custom styles for this template -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="/img/favicon.png">
  </head>

  <body id="page-top">
    <nav class="side-nav navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
      <a class="navbar-brand js-scroll-trigger" href="#page-top">
        <span class="d-block d-lg-none">Pierre Villette</span>

        <span class="d-none d-lg-block">
          <img class="img-fluid img-profile rounded-circle mx-auto mb-2" src="/img/profile.jpg" alt="Pierre Villette">
        </span>
      </a>

      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        {% include navigation.html %}
      </div>
    </nav>

    <div class="container-fluid p-0">

      {{ content }}

    </div>

    <!-- Bootstrap core JavaScript -->
    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/js/bootstrap.bundle.min.js"></script>

    <!-- Plugin JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-easing/1.4.1/jquery.easing.min.js"></script>

    <!-- Custom scripts for this template -->
    <script src="/js/contact.js"></script>
    <script src="/js/script.js"></script>
  </body>

</html>
