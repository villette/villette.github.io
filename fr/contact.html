---
id: contact
title: Contact
permalink: /fr/contact/
weight: 15
js: contact.js
---

<form action="//formspree.io/{{ site.email }}" method="post" class="contact">
  <div id="form" data-success="Votre message a bien été envoyé." data-error="Une erreur est apparue, veuillez réessayer plus tard.">
    <div class="form-group">
      <label for="input-name" class="required">Nom *</label>
      <input type="text" id="input-name" name="name" required="required" placeholder="Nom" class="form-control">
    </div>

    <div class="form-group">
      <label for="input-email" class="required">Adresse courriel *</label>
      <input type="email" id="input-email" name="email" required="required" placeholder="Courriel" class="form-control">
    </div>

    <div class="form-group">
      <label for="input-subject" class="required">Sujet *</label>
      <input type="text" id="input-subject" name="_subject" required="required" placeholder="Sujet" class="form-control">
    </div>

    <div class="form-group">
      <label for="input-message" class="required">Message *</label>
      <textarea id="input-message" name="message" required="required" placeholder="Message" rows="8" class="form-control"></textarea>
    </div>

    <input type="hidden" name="_next" value="//#{locals.host + locals.url}">
  </div>

  <a href="https://www.facebook.com/villette.pierre" target="_blank">
    <img class="social" src="/img/social/facebook.png" alt="Facebook">
  </a>

  <a href="https://www.linkedin.com/in/pierrevillette" target="_blank">
    <img class="social" src="/img/social/linkedin.png" alt="LinkedIn">
  </a>

  <a href="https://twitter.com/rocktownie" target="_blank">
    <img class="social" src="/img/social/twitter.png" alt="Twitter">
  </a>

  <a href="https://plus.google.com/+PierreVillette" target="_blank">
    <img class="social" src="/img/social/google.png" alt="Google+">
  </a>

  <button class="btn btn-default pull-right" type="submit">Envoyer</button>
</form>
