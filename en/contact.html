<form action="//formspree.io/villette.pierre@gmail.com" method="post" class="contact">
  <div id="form">
    <div class="form-group">
      <label for="input-name" class="required">Your name *</label>
      <input type="text" id="input-name" name="name" required="required" placeholder="Name" class="form-control">
    </div>

    <div class="form-group">
      <label for="input-email" class="required">Your email address *</label>
      <input type="email" id="input-email" name="email" required="required" placeholder="Email" class="form-control">
    </div>

    <div class="form-group">
      <label for="input-subject" class="required">Subject *</label>
      <input type="text" id="input-subject" name="_subject" required="required" placeholder="Subject" class="form-control">
    </div>

    <div class="form-group">
      <label for="input-message" class="required">Message *</label>
      <textarea id="input-message" name="message" required="required" placeholder="Message" rows="8" class="form-control"></textarea>
    </div>

    <input type="hidden" name="_next" value="//#{locals.host + locals.url}">
  </div>

  <a href="https://www.facebook.com/villette.pierre" target="_blank">
    <img class="social" src="/img/social/facebook.png" alt="Facebook">
  </a>

  <a href="http://www.linkedin.com/profile/view?id=59881520" target="_blank">
    <img class="social" src="/img/social/linkedin.png" alt="LinkedIn">
  </a>

  <a href="https://twitter.com/rocktownie" target="_blank">
    <img class="social" src="/img/social/twitter.png" alt="Twitter">
  </a>

  <a href="https://plus.google.com/111516010794303953476/posts" target="_blank">
    <img class="social" src="/img/social/google.png" alt="Google+">
  </a>

  <button class="btn btn-default pull-right" type="submit">Submit</button>
</form>
