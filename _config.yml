# Global configuration
defaults:
  -
    scope:
      path: en
    values:
      lang: en
      language: English
      layout: default
      description: PHP developer, Drupal expert

  -
    scope:
      path: fr
    values:
      lang: fr
      language: Français
      layout: default
      description: Développeur PHP, expert Drupal

exclude:
  - Gemfile
  - Gemfile.lock

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

