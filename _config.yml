# Global configuration
defaults:
  -
    scope:
      path: en
    values:
      lang: en
      language: English
      layout: default

  -
    scope:
      path: fr
    values:
      lang: fr
      language: Français
      layout: default

  -
    scope:
      path: es
    values:
      lang: es
      language: Español
      layout: default

exclude:
  - Gemfile
  - Gemfile.lock

